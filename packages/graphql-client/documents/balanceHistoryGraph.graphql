query BalanceHistoryGraph(
  $address: String!
  $orderBy: queryInput_historicalBalances_orderBy
  $orderDirection: OrderDirection
  $fromDate: Int
) {
  historicalBalances(
    address: $address
    fromDate: $fromDate
    orderBy: $orderBy
    orderDirection: $orderDirection
    limit: 1000
  ) {
    items {
      balance
      logIndex
      timestamp
      transactionHash
      transfer {
        from
        to
        value
      }
    }
  }
}
