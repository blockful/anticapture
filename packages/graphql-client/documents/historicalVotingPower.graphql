query HistoricalVotingPower(
  $address: String
  $skip: Int
  $limit: Int = 10
  $orderBy: queryInput_historicalVotingPower_orderBy = timestamp
  $orderDirection: OrderDirection = desc
  $toValue: String
  $fromValue: String
  $fromDate: Int
  $toDate: Int
) {
  historicalVotingPower(
    address: $address
    skip: $skip
    orderBy: $orderBy
    orderDirection: $orderDirection
    limit: $limit
    toValue: $toValue
    fromValue: $fromValue
    fromDate: $fromDate
    toDate: $toDate
  ) {
    items {
      accountId
      votingPower
      transfer {
        value
        to
        from
      }
      transactionHash
      timestamp
      logIndex
      delta
      delegation {
        from
        to
        value
      }
    }
    totalCount
  }
}
