query BalanceHistory(
  $address: String!
  $offset: Int = 0
  $limit: Int = 10
  $orderBy: queryInput_transfers_orderBy
  $orderDirection: OrderDirection
  $from: String
  $to: String
  $fromValue: String
  $toValue: String
  $fromDate: Int
  $toDate: Int
) {
  transfers(
    address: $address
    orderBy: $orderBy
    orderDirection: $orderDirection
    limit: $limit
    offset: $offset
    from: $from
    to: $to
    fromValue: $fromValue
    toValue: $toValue
    fromDate: $fromDate
    toDate: $toDate
  ) {
    items {
      timestamp
      amount
      fromAccountId
      toAccountId
      transactionHash
    }
    totalCount
  }
}
