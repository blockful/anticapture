query GetDelegateDelegationHistoryGraph(
  $accountId: String!
  $fromTimestamp: Int
  $toTimestamp: Int
  $orderBy: queryInput_historicalVotingPowerByAccountId_orderBy = timestamp
  $orderDirection: OrderDirection = desc
) {
  historicalVotingPowerByAccountId(
    address: $accountId
    orderBy: $orderBy
    orderDirection: $orderDirection
    fromDate: $fromTimestamp
    toDate: $toTimestamp
    limit: 1000
  ) {
    items {
      delta
      transactionHash
      timestamp
      delegation {
        from
        previousDelegate
        to
        value
      }
      transfer {
        from
        to
        value
      }
      votingPower
    }
    totalCount
  }
} 
