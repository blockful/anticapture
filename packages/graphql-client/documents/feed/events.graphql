query GetFeedEvents(
  $skip: Int
  $limit: Int = 10
  $orderBy: queryInput_feedEvents_orderBy = timestamp
  $orderDirection: OrderDirection = desc
  $relevance: queryInput_feedEvents_relevance = MEDIUM
  $type: [queryInput_feedEvents_type_items]
  $fromDate: Int
  $toDate: Int
) {
  feedEvents(
    skip: $skip
    limit: $limit
    orderBy: $orderBy
    orderDirection: $orderDirection
    relevance: $relevance
    type: $type
    fromDate: $fromDate
    toDate: $toDate
  ) {
    items {
      txHash
      logIndex
      type
      value
      timestamp
      relevance
      metadata {
        __typename
        ... on FeedVoteMetadata {
          voter
          reason
          support
          votingPower
          proposalId
          voteTitle: title
        }
        ... on FeedProposalMetadata {
          id
          proposer
          votingPower
          proposalTitle: title
        }
        ... on FeedProposalExtendedMetadata {
          id
          proposalExtendedTitle: title
          endBlock
          endTimestamp
          proposer
        }
        ... on FeedTransferMetadata {
          from
          to
          amount
        }
        ... on FeedDelegationMetadata {
          delegator
          delegate
          previousDelegate
          amount
        }
      }
    }
    totalCount
  }
}
