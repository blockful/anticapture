query GetDelegates(
  $addresses: [String]
  $limit: Int = 10
  $skip: Int = 0
  $orderDirection: OrderDirection = desc
  $orderBy: queryInput_votingPowers_orderBy = votingPower
  $fromDate: Int
  $toDate: Int
) {
  votingPowers(
    limit: $limit
    skip: $skip
    orderDirection: $orderDirection
    orderBy: $orderBy
    fromDate: $fromDate
    toDate: $toDate
    addresses: $addresses
  ) {
    items {
      accountId
      delegationsCount
      votingPower
      balance
      variation {
        absoluteChange
        percentageChange
      }
    }
    totalCount
  }
}
