query GetProposalsFromDao(
  $skip: Int
  $limit: Int = 10
  $orderDirection: OrderDirection = desc
  $status: [queryInput_proposals_status_items]
  $fromDate: Int
) {
  proposals(
    skip: $skip
    limit: $limit
    orderDirection: $orderDirection
    status: $status
    fromDate: $fromDate
  ) {
    items {
      id
      daoId
      txHash
      quorum
      forVotes
      againstVotes
      abstainVotes
      timestamp
      status
      proposerAccountId
      title
      startTimestamp
      endTimestamp
      targets
      values
    }
    totalCount
  }
}

query GetProposal($id: String!) {
  proposal(id: $id) {
    ... on OnchainProposal {
      id
      daoId
      txHash
      proposerAccountId
      title
      description
      quorum
      timestamp
      status
      forVotes
      againstVotes
      abstainVotes
      startTimestamp
      endTimestamp
      calldatas
      targets
      values
    }
  }
}

#  Get proposal votes
query GetVotes(
  $proposalId: String!
  $limit: Int
  $skip: Int
  $orderBy: queryInput_votesByProposalId_orderBy = timestamp
  $orderDirection: OrderDirection = desc
  $support: String
  $voterAddressIn: [String]
) {
  votesByProposalId(
    limit: $limit
    skip: $skip
    id: $proposalId
    orderBy: $orderBy
    orderDirection: $orderDirection
    support: $support
    voterAddressIn: $voterAddressIn
  ) {
    totalCount
    items {
      voterAddress
      transactionHash
      proposalId
      support
      votingPower
      reason
      timestamp
    }
  }
}

# Get voting power change
query GetVotingPowerChange(
  $addresses: [String]
  $fromDate: Int!
  $toDate: Int!
) {
  votingPowerVariations(
    addresses: $addresses
    fromDate: $fromDate
    toDate: $toDate
  ) {
    items {
      accountId
      previousVotingPower
      currentVotingPower
      absoluteChange
      percentageChange
    }
  }
}

# Get proposal non-voters
query GetProposalNonVoters(
  $id: String!
  $limit: Int
  $skip: Int
  $orderDirection: OrderDirection = desc
) {
  proposalNonVoters(
    id: $id
    limit: $limit
    skip: $skip
    orderDirection: $orderDirection
  ) {
    items {
      lastVoteTimestamp
      voter
      votingPower
      votingPowerVariation
    }
    totalCount
  }
}

# Get account power
query GetAccountPower(
  $address: String!
  $addresses: [String]
  $proposalId: String!
) {
  votingPowerByAccountId(accountId: $address) {
    accountId
    votingPower
  }
  votesByProposalId(id: $proposalId, voterAddressIn: $addresses) {
    items {
      support
      votingPower
      reason
      timestamp
      transactionHash
    }
    totalCount
  }
}

query SearchProposals($query: NonEmptyString!, $limit: Int, $skip: Int) {
  searchProposals(query: $query, limit: $limit, skip: $skip) {
    items {
      id
      daoId
      txHash
      quorum
      forVotes
      againstVotes
      abstainVotes
      timestamp
      status
      proposerAccountId
      title
      startTimestamp
      endTimestamp
      targets
      values
    }
    totalCount
  }
}

query OffchainSearchProposals($query: NonEmptyString!, $limit: Int, $skip: Int) {
  offchainSearchProposals(query: $query, limit: $limit, skip: $skip) {
    items {
      id
      spaceId
      author
      title
      type
      state
      start
      end
      created
      updated
      scores
      choices
    }
    totalCount
  }
}
