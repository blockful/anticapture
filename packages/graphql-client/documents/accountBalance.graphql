query AccountBalanceByAddress(
  $address: String!
  $fromDate: Int
  $toDate: Int
) {
  accountBalanceByAccountId(
    address: $address
    fromDate: $fromDate
    toDate: $toDate
  ) {
    ... on AccountBalanceWithVariationResponse {
      data {
        address
        balance
        delegate
        tokenId
        variation {
          absoluteChange
          percentageChange
          previousBalance
        }
      }
      period {
        endTimestamp
        startTimestamp
      }
    }
  }
}
