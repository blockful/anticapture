query TokenMetrics(
  $metricType: queryInput_tokenMetrics_metricType!
  $startDate: Float
  $endDate: Float
  $orderDirection: queryInput_tokenMetrics_orderDirection = asc
  $limit: NonNegativeInt = 365
  $skip: NonNegativeInt
) {
  tokenMetrics(
    metricType: $metricType
    startDate: $startDate
    endDate: $endDate
    orderDirection: $orderDirection
    limit: $limit
    skip: $skip
  ) {
    items {
      date
      high
      volume
    }
    pageInfo {
      hasNextPage
      startDate
      endDate
    }
  }
}
