query GetTokenHolders(
  $limit: Int
  $skip: Int
  $orderDirection: OrderDirection
  $orderBy: queryInput_accountBalances_orderBy = balance
  $fromDate: Int
  $addresses: [String]
) {
  accountBalances(
    orderDirection: $orderDirection
    orderBy: $orderBy
    fromDate: $fromDate
    limit: $limit
    skip: $skip
    addresses: $addresses
  ) {
    totalCount
    items {
      address
      balance
      delegate
      tokenId
      variation {
        previousBalance
        absoluteChange
        percentageChange
      }
    }
  }
}
