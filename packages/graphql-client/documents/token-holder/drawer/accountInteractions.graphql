query getAccountInteractions(
  $address: String!
  $limit: Int
  $maxAmount: String
  $minAmount: String
  $orderBy: queryInput_accountInteractions_orderBy
  $orderDirection: OrderDirection
  $skip: Int
  $filterAddress: String
) {
  accountInteractions(
    address: $address
    limit: $limit
    maxAmount: $maxAmount
    minAmount: $minAmount
    orderBy: $orderBy
    orderDirection: $orderDirection
    skip: $skip
    filterAddress: $filterAddress
  ) {
    totalCount
    items {
      accountId
      amountTransferred
      totalVolume
      transferCount
    }
  }
}
