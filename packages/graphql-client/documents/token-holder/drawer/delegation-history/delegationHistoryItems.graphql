query GetDelegationHistoryItems(
  $delegator: String!
  $delegate: [String]
  $skip: Int
  $limit: Int = 10
  $fromValue: String
  $toValue: String
  $orderDirection: OrderDirection = desc
) {
  historicalDelegations(
    address: $delegator
    delegateAddressIn: $delegate
    skip: $skip
    limit: $limit
    fromValue: $fromValue
    toValue: $toValue
    orderDirection: $orderDirection
  ) {
    items {
      delegatorAddress
      delegateAddress
      amount
      timestamp
      transactionHash
    }
    totalCount
  }
}
