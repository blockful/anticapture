query GetDelegators(
  $address: String!
  $skip: Int
  $orderBy: queryInput_delegators_orderBy = amount
  $limit: Int = 10
  $orderDirection: OrderDirection = desc
) {
  delegators(
    address: $address
    skip: $skip
    limit: $limit
    orderBy: $orderBy
    orderDirection: $orderDirection
  ) {
    items {
      delegatorAddress
      amount
      timestamp
    }
    totalCount
  }
}
