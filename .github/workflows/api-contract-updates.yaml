name: API Contract Updates

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  detect-contract-updates:
    name: Detect API contract updates
    runs-on: ubuntu-latest
    outputs:
      needs_manual_approval: ${{ steps.detect.outputs.needs_manual_approval }}
      missing_files: ${{ steps.detect.outputs.missing_files }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect generated contract updates
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "needs_manual_approval=false"
            echo "missing_files="
          } >> "$GITHUB_OUTPUT"

          mapfile -t changed_files < <(
            git diff --name-only \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}"
          )

          api_implementation_changed=false
          gateway_schema_changed=false
          gateful_openapi_changed=false

          for file in "${changed_files[@]}"; do
            case "$file" in
              *.test.ts | *.spec.ts | *.integration.test.ts)
                ;;
              apps/api/src/controllers/* | apps/api/src/mappers/*)
                api_implementation_changed=true
                ;;
              apps/api-gateway/schema.graphql)
                gateway_schema_changed=true
                ;;
              apps/gateful/openapi/gateful.json)
                gateful_openapi_changed=true
                ;;
            esac
          done

          if [[ "$api_implementation_changed" != "true" ]]; then
            echo "No API controller or mapper changes detected."
            exit 0
          fi

          missing=()
          if [[ "$gateway_schema_changed" != "true" ]]; then
            missing+=("apps/api-gateway/schema.graphql")
          fi
          if [[ "$gateful_openapi_changed" != "true" ]]; then
            missing+=("apps/gateful/openapi/gateful.json")
          fi

          if (( ${#missing[@]} > 0 )); then
            {
              echo "needs_manual_approval=true"
              echo "missing_files=${missing[*]}"
            } >> "$GITHUB_OUTPUT"

            echo "API controllers or mappers changed without corresponding generated contract updates."
            echo "Missing required changed file(s):"
            printf ' - %s\n' "${missing[@]}"
            echo "Manual approval is required before this PR can merge."
            exit 0
          fi

          echo "API contract updates are present."

  approve-contract-exception:
    name: API contract exception approval
    needs: detect-contract-updates
    if: needs.detect-contract-updates.outputs.needs_manual_approval == 'true'
    runs-on: ubuntu-latest
    environment: api-contract-exception

    steps:
      - name: Confirm manual approval
        shell: bash
        run: |
          set -euo pipefail

          echo "API contract exception manually approved."
          echo "Missing generated contract update(s):"
          printf '%s\n' "${{ needs.detect-contract-updates.outputs.missing_files }}"
