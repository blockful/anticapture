name: GraphQL Client Codegen

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  codegen:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            graphql:
              - "apps/api/**/*.ts"
              - "apps/api-gateway/**/*.ts"
              - "packages/graphql-client/**"
            rest:
              - "apps/gateful/openapi/gateful.json"
              - "apps/gateful/**/*.ts"
              - "packages/anticapture-client/**"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run GraphQL codegen
        if: ${{ steps.changes.outputs.graphql == 'true' }}
        run: pnpm gql-client codegen

      - name: Run Rest codegen
        if: ${{ steps.changes.outputs.rest == 'true' }}
        run: pnpm client codegen
