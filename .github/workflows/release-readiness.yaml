name: Release Readiness

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  unconsumed-changesets:
    name: Check unconsumed changesets
    # Only the dev -> main promotion must be changeset-free; hotfix PRs carry
    # their own changeset, consumed later when main is back-merged into dev.
    if: github.head_ref == 'dev'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fail when unconsumed changesets remain
        shell: bash
        run: |
          set -euo pipefail

          unconsumed=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')
          if [ "$unconsumed" -gt 0 ]; then
            echo "::error::Unconsumed changesets found. Merge the open Version Packages PR on dev first, then re-open this PR."
            exit 1
          fi
