scrape_configs:
  # Ponder indexer built-in metrics (port 42069)
  # Run: pnpm indexer dev
  - job_name: ponder
    metrics_path: "/metrics"
    scrape_interval: 15s
    static_configs:
      - targets: ["host.docker.internal:42069"]

  # Anticapture API custom metrics (port 42069 by default, set PORT env to change)
  # Run: pnpm api dev
  # Note: API and indexer share port 42069 but run separately (different deployments).
  # In production each service runs on its own host; override the target accordingly.
  - job_name: anticapture-api
    metrics_path: "/metrics"
    scrape_interval: 15s
    static_configs:
      - targets: ["host.docker.internal:42069"]

  - job_name: otelcol-metrics
    static_configs:
      - targets: ["otelcol:8889"]
