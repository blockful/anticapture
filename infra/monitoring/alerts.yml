groups:
  - name: anticapture
    interval: 30s
    rules:
      # Non-DAO service is not responding (no scrape data for 5 minutes)
      - alert: ServiceDown
        expr: up{job!~"anticapture-.*-(api|indexer(?:-ponder)?)"} == 0
        for: 5m
        keep_firing_for: 15m
        labels:
          severity: critical
        annotations:
          summary: "[CRITICAL] {{ $labels.job }} is unreachable"
          description: >
            Prometheus has been unable to scrape {{ $labels.job }} at {{ $labels.instance }}
            for more than 5 minutes. The service may be crashed, OOM-killed, or misconfigured.
            Check container/process status and recent logs immediately.

      # DAO API is not responding
      - alert: ApiDown
        expr: up{job=~"anticapture-.*-api"} == 0
        for: 5m
        keep_firing_for: 15m
        labels:
          severity: critical
        annotations:
          summary: "[CRITICAL] {{ $labels.job }} is unreachable"
          description: >
            Prometheus has been unable to scrape {{ $labels.job }} at {{ $labels.instance }}
            for more than 5 minutes. DAO API traffic for this DAO is unavailable.

      # Indexer scrape endpoints are not responding — longer window for slow startup
      - alert: IndexerDown
        expr: up{job=~"anticapture-.*-indexer(?:-ponder)?"} == 0
        for: 10m
        keep_firing_for: 15m
        labels:
          severity: critical
        annotations:
          summary: "[CRITICAL] {{ $labels.job }} is unreachable"
          description: >
            Prometheus has been unable to scrape {{ $labels.job }} at {{ $labels.instance }}
            for more than 10 minutes. If the indexer was not recently deployed,
            check process health, Ponder metrics, and recent logs.

      - alert: IndexerSyncStale
        expr: time() - max by (job) (ponder_sync_block_timestamp{job=~"anticapture-.*-indexer-ponder"}) > 600
        for: 10m
        keep_firing_for: 15m
        labels:
          severity: warning
        annotations:
          summary: "[WARNING] {{ $labels.job }} sync timestamp is stale"
          description: >
            Ponder has not advanced its synced block timestamp for
            {{ printf "%.0f" $value }} seconds. Check RPC health and indexing errors.

      # Nodeful (our own node) stopped serving mainnet traffic through eRPC while the
      # network still has traffic — everything is silently falling back to chainstack.
      # Catches the failed-bootstrap case too: an unregistered upstream has no evm:1
      # series at all, which the `or vector(0)` turns into a firing zero.
      - alert: ErpcNodefulNoTraffic
        expr: >
          (
            sum(rate(erpc_upstream_request_total{upstream="nodeful", network="evm:1"}[15m]))
            or vector(0)
          ) == 0
          and
          sum(rate(erpc_upstream_request_total{network="evm:1"}[15m])) > 0.05
        for: 10m
        keep_firing_for: 15m
        labels:
          severity: warning
        annotations:
          summary: "[WARNING] eRPC is serving no mainnet traffic through nodeful"
          description: >
            Nodeful has served zero evm:1 requests for 15+ minutes while eRPC is receiving
            mainnet traffic — all of it is falling back to chainstack. Most likely nodeful
            failed its eth_chainId bootstrap probe. Check that reth on the nodeful box is
            listening on 8545 (not localhost-only), the nodeful Railway tailscale proxy is
            up with a valid TAILSCALE_AUTHKEY, and erpc logs for "initialization task failed".

      - alert: ErpcCacheHitRateLow
        expr: >
          (
            (sum(rate(erpc_cache_get_success_hit_total{job="anticapture-erpc"}[15m])) or vector(0))
            /
            clamp_min(
              (sum(rate(erpc_cache_get_success_hit_total{job="anticapture-erpc"}[15m])) or vector(0))
              + (sum(rate(erpc_cache_get_success_miss_total{job="anticapture-erpc"}[15m])) or vector(0)),
              0.000001
            )
          ) < 0.5
          and
          (sum(rate(erpc_cache_get_success_hit_total{job="anticapture-erpc"}[15m])) or vector(0))
          + (sum(rate(erpc_cache_get_success_miss_total{job="anticapture-erpc"}[15m])) or vector(0)) > 0.1
        for: 15m
        keep_firing_for: 15m
        labels:
          severity: warning
        annotations:
          summary: "[WARNING] eRPC cache hit rate is below 50%"
          description: >
            eRPC cache hit rate has been {{ printf "%.1f" $value }} for 15 minutes while
            cache traffic is active. Check finality classification, PostgreSQL health,
            cache policy matching, and whether indexers are requesting identical block bodies.

      - alert: ErpcCacheErrors
        expr: >
          (sum(rate(erpc_cache_get_error_total{job="anticapture-erpc"}[5m])) or vector(0))
          + (sum(rate(erpc_cache_set_error_total{job="anticapture-erpc"}[5m])) or vector(0)) > 0
        for: 5m
        keep_firing_for: 15m
        labels:
          severity: warning
        annotations:
          summary: "[WARNING] eRPC cache operations are failing"
          description: >
            eRPC cache operations have failed continuously for 5 minutes. Requests still
            fall through to upstreams, but RPC spend and latency will increase. Check the
            cache PostgreSQL service and eRPC logs.

      - alert: RailwayExporterStale
        expr: time() - (railway_exporter_last_scrape_success or vector(0)) > 300
        for: 5m
        keep_firing_for: 15m
        labels:
          severity: critical
        annotations:
          summary: "[CRITICAL] Railway platform metrics are stale"
          description: >
            The Railway exporter has not completed an API collection for at least 5 minutes.
            Check its API token, environment targets, rate limits, and logs.

      - alert: RailwayHighMemoryUtilization
        expr: max by (project_name, environment_name, service_name) (railway_service_memory_utilization) > 0.85
        for: 10m
        keep_firing_for: 15m
        labels:
          severity: warning
        annotations:
          summary: "[WARNING] Railway RAM above 85% on {{ $labels.service_name }}"
          description: >
            {{ $labels.project_name }}/{{ $labels.environment_name }}/{{ $labels.service_name }}
            has used {{ printf "%.1f" $value }} of its Railway memory limit for 10 minutes.
            Check for growth, cache pressure, and OOM restarts before increasing the limit.

      - alert: RailwayHighEgress
        expr: >
          sum by (project_name, environment_name, service_name) (
            clamp_min(increase(railway_service_network_tx_gb_total[1h]), 0)
          ) > 5
        for: 10m
        keep_firing_for: 15m
        labels:
          severity: warning
        annotations:
          summary: "[WARNING] Railway egress above 5 GB/hour on {{ $labels.service_name }}"
          description: >
            {{ $labels.project_name }}/{{ $labels.environment_name }}/{{ $labels.service_name }}
            transmitted {{ printf "%.2f" $value }} GB over the last hour. Check public database
            URLs, oversized responses, and traffic spikes; prefer Railway private networking.

      - alert: PostgreSQLHighConnections
        expr: >
          sum by (server) (pg_stat_activity_count{job="anticapture-postgres-exporter"})
          /
          clamp_min(max by (server) (pg_settings_max_connections{job="anticapture-postgres-exporter"}), 1)
          > 0.8
        for: 10m
        keep_firing_for: 15m
        labels:
          severity: warning
        annotations:
          summary: "[WARNING] PostgreSQL connections above 80% on {{ $labels.server }}"
          description: >
            PostgreSQL instance {{ $labels.server }} has used {{ printf "%.1f" $value }} of
            max_connections for 10 minutes. Inspect eRPC pool use and other clients before
            the database starts rejecting sessions.

      - alert: PostgreSQLUnavailable
        expr: >
          pg_up{job="anticapture-postgres-exporter"} == 0
          or absent(pg_up{job="anticapture-postgres-exporter"})
        for: 2m
        keep_firing_for: 15m
        labels:
          severity: critical
        annotations:
          summary: "[CRITICAL] PostgreSQL is unavailable {{ with $labels.server }}on {{ . }}{{ end }}"
          description: >
            postgres_exporter cannot query PostgreSQL instance
            {{ or $labels.server "(no pg_up series at all — exporter down?)" }}. eRPC cache
            requests will fall through to upstream RPC providers until connectivity recovers.

      - alert: PostgreSQLDeadlocks
        expr: >
          sum by (server) (increase(pg_stat_database_deadlocks{job="anticapture-postgres-exporter"}[5m])) > 0
        for: 1m
        keep_firing_for: 15m
        labels:
          severity: warning
        annotations:
          summary: "[WARNING] PostgreSQL deadlock detected on {{ $labels.server }}"
          description: >
            PostgreSQL instance {{ $labels.server }} reported {{ printf "%.0f" $value }}
            deadlocks in the last 5 minutes. Inspect blocked statements and cache database
            contention.

      # CPU usage above 80% for 5 minutes
      - alert: HighCPUUsage
        expr: sum by (job) (rate(process_cpu_time_seconds_total[1m])) * 100 > 80
        for: 5m
        keep_firing_for: 15m
        labels:
          severity: warning
        annotations:
          summary: "[WARNING] High CPU usage on {{ $labels.job }}"
          description: >
            {{ $labels.job }} has been using {{ printf "%.1f" $value }}% CPU for more than
            5 minutes. This may indicate a processing backlog, tight indexing loop, or a
            runaway query. Review process metrics and recent workload.

      # p99 HTTP latency above 2s for 5 minutes
      - alert: HighLatency
        expr: >
          histogram_quantile(0.99,
            sum(rate(http_server_request_duration_seconds_bucket[5m])) by (le, job)
          ) > 2
        for: 5m
        keep_firing_for: 15m
        labels:
          severity: warning
        annotations:
          summary: "[WARNING] High p99 HTTP latency on {{ $labels.job }}"
          description: >
            {{ $labels.job }} p99 HTTP response time has been {{ printf "%.2f" $value }}s for
            more than 5 minutes (threshold: 2s). This may indicate slow database queries,
            resource contention, or downstream bottlenecks. Check slow query logs and DB
            connection pool.

      # 5xx error rate above 1% for 2 minutes
      - alert: HighErrorRate
        expr: >
          (
            sum by (job) (rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[2m]))
            /
            sum by (job) (rate(http_server_request_duration_seconds_count[2m]))
            * 100 > 1
          )
          and
          sum by (job) (rate(http_server_request_duration_seconds_count[2m])) > 0.1
        for: 2m
        keep_firing_for: 15m
        labels:
          severity: critical
        annotations:
          summary: "[CRITICAL] Elevated 5xx error rate on {{ $labels.job }}"
          description: >
            {{ $labels.job }} 5xx error rate has been {{ printf "%.2f" $value }}% for more than
            2 minutes (threshold: 1%). Users are experiencing server errors. Check application
            logs for stack traces, database connectivity, and any recent deployments that may
            have introduced regressions.
