alerting:
  alertmanagers:
    - static_configs:
        - targets: ["${ALERTMANAGER_ENDPOINT}"]

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: anticapture-ens-indexer
    metrics_path: "/metrics"
    scrape_interval: 15s
    static_configs:
      - targets: ["${ENS_INDEXER_ENDPOINT}"]

  - job_name: anticapture-ens-api
    metrics_path: "/metrics"
    scrape_interval: 15s
    static_configs:
      - targets: ["${ENS_API_ENDPOINT}"]

  - job_name: anticapture-aave-indexer
    metrics_path: "/metrics"
    scrape_interval: 15s
    static_configs:
      - targets: ["${AAVE_INDEXER_ENDPOINT}"]

  - job_name: anticapture-aave-api
    metrics_path: "/metrics"
    scrape_interval: 15s
    static_configs:
      - targets: ["${AAVE_API_ENDPOINT}"]

  - job_name: anticapture-gateway
    metrics_path: "/metrics"
    scrape_interval: 15s
    static_configs:
      - targets: ["${GATEWAY_ENDPOINT}"]
