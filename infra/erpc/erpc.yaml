logLevel: ${LOG_LEVEL:-warn}

server:
  httpHostV4: "0.0.0.0"
  httpPort: 4000
  listenV6: true
  httpHostV6: "[::]"
  httpPortV6: 5000

metrics:
  enabled: true
  hostV4: "0.0.0.0"
  hostV6: "[::]"
  port: 4001
  listenV6: true

# Two projects: indexer (high throughput) vs api (conservative per-IP limits)
# Access via: http://erpc:4000/indexer/evm/<chainId> or http://erpc:4000/api/evm/<chainId>
projects:
  - id: indexer
    rateLimitBudget: indexer-limit
    networks:
      - architecture: evm
        evm:
          chainId: 1
      - architecture: evm
        evm:
          chainId: 534352
    upstreams:
      - id: chainstack
        endpoint: chainstack://${CHAINSTACK_API_KEY}
        rateLimitBudget: chainstack-indexer
        group: primary
        autoIgnoreUnsupportedMethods: true
        failsafe:
          - matchMethod: "*"
            timeout:
              duration: 15s
            retry:
              maxAttempts: 3
              delay: 300ms
              backoffMaxDelay: 5s
              backoffFactor: 1.5

  - id: api
    rateLimitBudget: api-limit
    networks:
      - architecture: evm
        evm:
          chainId: 1
      - architecture: evm
        evm:
          chainId: 534352
    upstreams:
      - id: chainstack
        endpoint: chainstack://${CHAINSTACK_API_KEY}
        rateLimitBudget: chainstack-api
        group: primary
        autoIgnoreUnsupportedMethods: true
        failsafe:
          - matchMethod: "*"
            timeout:
              duration: 10s
            retry:
              maxAttempts: 2
              delay: 200ms

rateLimiters:
  store:
    driver: memory

  budgets:
    # Upstream-level: split Chainstack's 400 req/s between indexer and api
    - id: chainstack-indexer
      rules:
        - method: "*"
          maxCount: 300
          period: second
    - id: chainstack-api
      rules:
        - method: "*"
          maxCount: 100
          period: second
    # Project-level: self-imposed limits
    - id: indexer-limit
      rules:
        - method: "*"
          maxCount: 300
          period: second
    - id: api-limit
      rules:
        - method: "*"
          maxCount: 20
          period: second
          perIP: true

database:
  evmJsonRpcCache:
    connectors:
      - id: memory-cache
        driver: memory
        memory:
          maxItems: 100000
      - id: postgres-cache
        driver: postgresql
        postgresql:
          connectionUri: "${DATABASE_URL}"
          table: rpc_cache
    policies:
      - network: "*"
        method: "*"
        finality: finalized
        connector: memory-cache
        ttl: 0
      - network: "*"
        method: "*"
        finality: unfinalized
        connector: memory-cache
        maxItemSize: 1MB # optional max size of item to store via this policy
        ttl: 5s
      - network: "*"
        method: "*"
        finality: unknown
        connector: memory-cache
        ttl: 5s
      - network: "*" # supports * as wildcard and | as OR operator
        method: "eth_getLogs|trace_*" # supports * as wildcard and | as OR operator
        finality: finalized
        connector: postgres-cache
        ttl: 0
