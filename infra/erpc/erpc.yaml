logLevel: ${LOG_LEVEL:-warn}

server:
  httpHostV6: "[::]"
  httpPortV6: 5000
  listenV6: true
  maxTimeout: 60s

metrics:
  enabled: true
  hostV4: "0.0.0.0"
  hostV6: "[::]"
  port: 4001
  listenV6: true

projects:
  - id: indexer
    rateLimitBudget: indexer-limit
    networks:
      - architecture: evm
        failsafe:
          timeout:
            duration: 30s
          retry:
            maxAttempts: 5
            delay: 500ms
            backoffMaxDelay: 10s
            backoffFactor: 0.5
            jitter: 200ms
          hedge:
            delay: 3s
            maxCount: 2
        evm:
          chainId: 1
      - architecture: evm
        failsafe:
          timeout:
            duration: 30s
          retry:
            maxAttempts: 5
            delay: 500ms
            backoffMaxDelay: 10s
            backoffFactor: 0.5
            jitter: 200ms
          hedge:
            delay: 3s
            maxCount: 2
        evm:
          chainId: 10
      - architecture: evm
        failsafe:
          timeout:
            duration: 30s
          retry:
            maxAttempts: 5
            delay: 500ms
            backoffMaxDelay: 10s
            backoffFactor: 0.5
            jitter: 200ms
          hedge:
            delay: 3s
            maxCount: 2
        evm:
          chainId: 534352
    upstreams:
      - id: nodeful
        endpoint: ${NODEFUL_RPC_URL}
        vendorName: nodeful
        rateLimitBudget: nodeful
        autoIgnoreUnsupportedMethods: true
      - id: envio
        endpoint: evm+envio://rpc.hypersync.xyz/${ENVIO_API_KEY}
        vendorName: Envio
        rateLimitBudget: envio
        autoIgnoreUnsupportedMethods: true
      - id: chainstack
        endpoint: chainstack://${CHAINSTACK_API_KEY}?project=PR-494-784
        vendorName: Chainstack
        rateLimitBudget: chainstack
        group: fallback
        autoIgnoreUnsupportedMethods: true

  - id: api
    rateLimitBudget: api-limit
    networks:
      - architecture: evm
        failsafe:
          timeout:
            duration: 15s
          retry:
            maxAttempts: 3
            delay: 300ms
            backoffMaxDelay: 5s
            backoffFactor: 1.5
        evm:
          chainId: 1
      - architecture: evm
        failsafe:
          timeout:
            duration: 15s
          retry:
            maxAttempts: 3
            delay: 300ms
            backoffMaxDelay: 5s
            backoffFactor: 1.5
        evm:
          chainId: 10
      - architecture: evm
        failsafe:
          timeout:
            duration: 15s
          retry:
            maxAttempts: 3
            delay: 300ms
            backoffMaxDelay: 5s
            backoffFactor: 1.5
        evm:
          chainId: 534352
    upstreams:
      - id: nodeful
        endpoint: ${NODEFUL_RPC_URL}
        vendorName: nodeful
        rateLimitBudget: nodeful
        autoIgnoreUnsupportedMethods: true
      - id: envio
        endpoint: evm+envio://rpc.hypersync.xyz/${ENVIO_API_KEY}
        vendorName: Envio
        rateLimitBudget: envio
        autoIgnoreUnsupportedMethods: true
      - id: chainstack
        endpoint: chainstack://${CHAINSTACK_API_KEY}?project=PR-494-784
        vendorName: Chainstack
        rateLimitBudget: chainstack
        group: fallback
        autoIgnoreUnsupportedMethods: true

  - id: dashboard
    rateLimitBudget: dashboard-limit
    networks:
      - architecture: evm
        failsafe:
          timeout:
            duration: 15s
          retry:
            maxAttempts: 3
            delay: 300ms
            backoffMaxDelay: 5s
            backoffFactor: 1.5
        evm:
          chainId: 1
      - architecture: evm
        failsafe:
          timeout:
            duration: 15s
          retry:
            maxAttempts: 3
            delay: 300ms
            backoffMaxDelay: 5s
            backoffFactor: 1.5
        evm:
          chainId: 10
      - architecture: evm
        failsafe:
          timeout:
            duration: 15s
          retry:
            maxAttempts: 3
            delay: 300ms
            backoffMaxDelay: 5s
            backoffFactor: 1.5
        evm:
          chainId: 534352
    upstreams:
      - id: nodeful
        endpoint: ${NODEFUL_RPC_URL}
        vendorName: nodeful
        rateLimitBudget: nodeful
        autoIgnoreUnsupportedMethods: true
      - id: chainstack
        endpoint: chainstack://${CHAINSTACK_API_KEY}?project=PR-494-784
        vendorName: Chainstack
        rateLimitBudget: chainstack
        group: fallback
        autoIgnoreUnsupportedMethods: true
    auth:
      strategies:
        - type: secret
          secret:
            value: ${RPC_SECRET}
    cors:
      allowedOrigins:
        - "*"
      allowedMethods:
        - GET
        - POST
        - OPTIONS
      allowedHeaders:
        - Content-Type
        - Authorization
      exposedHeaders:
        - X-Request-ID
      allowCredentials: true
      maxAge: 3600

rateLimiters:
  store:
    driver: memory
  budgets:
    - id: nodeful
      rules:
        - method: "*"
          maxCount: 250
          period: 1s
          waitTime: 5s
        - method: eth_getLogs
          maxCount: 15
          period: 1s
          waitTime: 10s
        - method: eth_call
          maxCount: 75
          period: 1s
          waitTime: 5s
        - method: eth_getCode
          maxCount: 75
          period: 1s
          waitTime: 5s
        - method: eth_getStorageAt
          maxCount: 75
          period: 1s
          waitTime: 5s
    - id: envio
      rules:
        - method: "*"
          maxCount: 400
          period: 1s
          waitTime: 30s
        - method: eth_getLogs
          maxCount: 150
          period: 1s
          waitTime: 10s
    - id: chainstack
      rules:
        - method: "*"
          maxCount: 400
          period: 1s
          waitTime: 30s
    - id: indexer-limit
      rules:
        - method: "*"
          maxCount: 300
          period: 1s
    - id: api-limit
      rules:
        - method: "*"
          maxCount: 20
          period: 1s
          perIP: true
    - id: dashboard-limit
      rules:
        - method: "*"
          maxCount: 20
          period: 1s
          perIP: true

database:
  evmJsonRpcCache:
    connectors:
      - id: pg-main
        driver: postgresql
        postgresql:
          connectionUri: "${DATABASE_URL}"
          table: rpc_cache
      - id: memory-unfinalized
        driver: memory
        memory:
          maxItems: 4096
      - id: memory-realtime
        driver: memory
        memory:
          maxItems: 4096
    policies:
      - connector: pg-main
        network: "*"
        method: "*"
        finality: finalized
        empty: allow
        maxItemSize: 4MB
        ttl: 0
      - connector: memory-unfinalized
        network: "*"
        method: "*"
        finality: unfinalized
        empty: ignore
        ttl: 2s
        maxItemSize: 20KB
      - connector: memory-unfinalized
        network: "*"
        method: "*"
        finality: unknown
        empty: ignore
        ttl: 2s
        maxItemSize: 20KB
      - connector: memory-realtime
        network: "evm:1"
        method: "*"
        finality: realtime
        ttl: 12s
      - connector: memory-realtime
        network: "evm:10"
        method: "*"
        finality: realtime
        ttl: 2s
      - connector: memory-realtime
        network: "evm:534352"
        method: "*"
        finality: realtime
        ttl: 1s
