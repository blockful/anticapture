# YAML translation of:
# https://github.com/frak-id/infra-blockchain/blob/6e907c50db2117083a113ee74e2d38d1a6b596ea/packages/erpc/src/index.ts

logLevel: ${ERPC_LOG_LEVEL:-info}

server:
  httpPort: 8080
  maxTimeout: 60s
  listenV6: false

metrics:
  enabled: false

projects:
  - id: ponder-rpc
    networks:
      - architecture: evm
        failsafe:
          timeout:
            duration: 30s
          retry:
            maxAttempts: 5
            delay: 500ms
            backoffMaxDelay: 10s
            backoffFactor: 0.5
            jitter: 200ms
          hedge:
            delay: 3s
            maxCount: 2
        evm:
          chainId: 42161
    upstreams:
      - id: envio
        endpoint: evm+envio://rpc.hypersync.xyz
        type: evm+envio
        vendorName: Envio
        rateLimitBudget: envio
        ignoreMethods:
          - "*"
        allowMethods:
          - eth_chainId
          - eth_blockNumber
          - eth_getLogs
          - eth_getBlock*
          - eth_getTransaction*

    auth:
      strategies:
        - type: secret
          secret:
            value: ${PONDER_RPC_SECRET:-a}

  - id: ponder-dev-rpc
    networks:
      - architecture: evm
        failsafe:
          timeout:
            duration: 120s
          retry:
            maxAttempts: 3
            delay: 1s
            backoffMaxDelay: 30s
            backoffFactor: 0.5
            jitter: 200ms
          hedge:
            delay: 5s
            maxCount: 2
        evm:
          chainId: 421614
    upstreams:
      - id: envio
        endpoint: evm+envio://rpc.hypersync.xyz
        type: evm+envio
        vendorName: Envio
        rateLimitBudget: envio
        ignoreMethods:
          - "*"
        allowMethods:
          - eth_chainId
          - eth_blockNumber
          - eth_getLogs
          - eth_getBlock*
          - eth_getTransaction*
    auth:
      strategies:
        - type: secret
          secret:
            value: ${PONDER_RPC_SECRET:-a}

  - id: nexus-rpc
    networks:
      - architecture: evm
        failsafe:
          timeout:
            duration: 30s
          retry:
            maxAttempts: 5
            delay: 500ms
            backoffMaxDelay: 10s
            backoffFactor: 0.5
            jitter: 200ms
          hedge:
            delay: 3s
            maxCount: 2
        evm:
          chainId: 42161
      - architecture: evm
        failsafe:
          timeout:
            duration: 120s
          retry:
            maxAttempts: 3
            delay: 1s
            backoffMaxDelay: 30s
            backoffFactor: 0.5
            jitter: 200ms
          hedge:
            delay: 5s
            maxCount: 2
        evm:
          chainId: 421614
    upstreams:
      - id: alchemy
        endpoint: evm+alchemy://${ALCHEMY_API_KEY}
        type: evm+alchemy
        vendorName: Alchemy
        rateLimitBudget: alchemy
        ignoreMethods:
          - eth_estimateUserOperationGas
          - eth_getUserOperation*
          - eth_sendUserOperation
          - eth_supportedEntryPoints
          - pm_*
          - pimlico_*
      - id: drpc
        endpoint: drpc://${DRPC_API_KEY}
        type: evm+drpc
        vendorName: drpc
        rateLimitBudget: drpc
        ignoreMethods:
          - "*"
        allowMethods:
          - eth_chainId
          - eth_blockNumber
          - eth_getLogs
          - eth_getBlock*
          - eth_getTransaction*
          - eth_call
          - eth_getCode
          - eth_getStorageAt
      - id: pimlico
        endpoint: evm+pimlico://${PIMLICO_API_KEY}
        type: evm+pimlico
        vendorName: Pimlico
        rateLimitBudget: pimlico
        ignoreMethods:
          - "*"
        allowMethods:
          - eth_chainId
          - eth_estimateUserOperationGas
          - eth_getUserOperation*
          - eth_sendUserOperation
          - eth_supportedEntryPoints
          - pm_*
          - pimlico_*
      - id: llamaFree
        endpoint: https://arbitrum.llamarpc.com
        type: evm
        vendorName: LlamaFree
        rateLimitBudget: llamaFree
        ignoreMethods:
          - "*"
        allowMethods:
          - eth_chainId
          - eth_blockNumber
          - eth_call
          - eth_getCode
          - eth_getStorageAt
          - eth_getBlock*
          - eth_getTransaction*
    auth:
      strategies:
        - type: secret
          secret:
            value: ${NEXUS_RPC_SECRET:-a}
    cors:
      allowedOrigins:
        - "*"
      allowedMethods:
        - GET
        - POST
        - OPTIONS
      allowedHeaders:
        - Content-Type
        - Authorization
      exposedHeaders:
        - X-Request-ID
      allowCredentials: true
      maxAge: 3600

rateLimiters:
  store:
    driver: memory
  budgets:
    # - id: alchemy
    #   rules:
    #     - method: "*"
    #       maxCount: 200
    #       period: 1s
    #       waitTime: 30s
    #     - method: eth_getLogs
    #       maxCount: 20
    #       period: 1s
    #       waitTime: 10s
    #     - method: eth_getBlockByNumber
    #       maxCount: 40
    #       period: 1s
    #       waitTime: 10s
    - id: envio
      rules:
        - method: "*"
          maxCount: 400
          period: 1s
          waitTime: 30s
        - method: eth_getLogs
          maxCount: 150
          period: 1s
          waitTime: 10s

database:
  evmJsonRpcCache:
    connectors:
      - id: pg-main
        driver: postgresql
        postgresql:
          connectionUri: ${ERPC_DATABASE_URL}
          table: rpc_cache
      - id: memory-unfinalized
        driver: memory
        memory:
          maxItems: 4096
      - id: memory-realtime
        driver: memory
        memory:
          maxItems: 4096
    policies:
      - connector: pg-main
        network: "*"
        method: "*"
        finality: finalized
        empty: allow
      - connector: memory-unfinalized
        network: "*"
        method: "*"
        finality: unfinalized
        empty: ignore
        ttl: 2s
        maxItemSize: 20KB
      - connector: memory-realtime
        network: evm:42161
        method: "*"
        finality: realtime
        empty: ignore
        ttl: 2s
      - connector: memory-realtime
        network: evm:421614
        method: "*"
        finality: realtime
        empty: ignore
        ttl: 30s
