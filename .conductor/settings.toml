"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
archive = "pnpm clean"
setup = "export TERM_PROGRAM=conductor\npnpm i\ncp ./apps/api/.env.example ./apps/api/.env\nrailway link -p anticapture-infra -e dev -s ens-api\npnpm codegen\npnpm client build --force"

[scripts.run.run]
available_in = "local"
command = "pnpm dev ens"
default = true
icon = "play"
