services:
  contracts:
    build:
      context: packages/local-node
      dockerfile: Dockerfile
    ports:
      - "8545:8545"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/anvil-ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  indexer:
    build:
      context: .
      dockerfile: infra/indexer/Dockerfile.indexer
    command:
      ["npm", "run", "start", "--", "--config", "config/ens.local.config.ts"]
    environment:
      - DAO_ID=ENS
      - NETWORK=anvil
      - RPC_URL=http://contracts:8545
      - CHAIN_ID=31337
      - PORT=42069
    depends_on:
      contracts:
        condition: service_healthy
    ports:
      - "42069:42069"
    networks:
      - backend

  indexer-db:
    image: postgres:16.2
    ports:
      - "5432:5432"
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
    networks:
      - backend

  prometheus:
    image: prom/prometheus
    profiles: [monitoring]
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./infra/monitoring/prometheus/:/etc/prometheus/
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    networks:
      - backend

  alertmanager:
    image: prom/alertmanager:latest
    profiles: [monitoring]
    ports:
      - "9093:9093"
    volumes:
      - ./infra/monitoring/alertmanager/:/etc/alertmanager/
    command:
      - --config.file=/etc/alertmanager/config.yml
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    networks:
      - backend

  grafana:
    image: grafana/grafana
    profiles: [monitoring]
    ports:
      - "3000:3000"
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    entrypoint: >
      sh -c "cp -r /etc/grafana/provisioning_temp/dashboards/. /etc/grafana/provisioning/dashboards &&
             find /etc/grafana/provisioning/dashboards/ -name '*.json' -exec sed -i 's/$${DS_PROMETHEUS}/Prometheus/g' {} \+ &&
             /run.sh"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./infra/monitoring/grafana/dashboards:/etc/grafana/provisioning_temp/dashboards
      - ./infra/monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini
    depends_on:
      - prometheus
    networks:
      - backend

  otelcol:
    image: otel/opentelemetry-collector-contrib:latest
    profiles: [monitoring]
    volumes:
      - ./infra/monitoring/otelcol/config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4318:4318"
      - "8889:8889"
    networks:
      - backend

  tempo:
    image: grafana/tempo:2.6.1
    profiles: [monitoring]
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/monitoring/tempo/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
      - "4317:4317"
    networks:
      - backend

volumes:
  prometheus_data:
  grafana_data:
  tempo_data:

networks:
  backend:
